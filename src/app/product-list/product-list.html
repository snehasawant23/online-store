<!-- Featured Products Section -->
<section class="container my-5">
  <!-- Section Header -->
  <div class="text-center mb-5">
    <h2 class="section-title">Featured Products</h2>
    <p class="lead text-muted">
      Discover our most popular products with amazing discounts and premium quality.
    </p>
  </div>

  <!-- Category Filter Buttons -->
  <div class="text-center mb-4">
    <button class="btn btn-outline-primary m-1">All</button>
    <button class="btn btn-outline-primary m-1">Electronics</button>
    <button class="btn btn-outline-primary m-1">Mobiles</button>
    <button class="btn btn-outline-primary m-1">Accessories</button>
    <button class="btn btn-outline-primary m-1">Wearables</button>
  </div>

  <!-- Products Grid -->
  <div class="row">
    <div
      class="col-xl-3 col-lg-4 col-md-6 mb-4"
      *ngFor="let product of products"
    >
      <div class="card h-100 shadow-sm border-0">

        <!-- Product Badge -->
        <div class="position-absolute top-0 start-0 m-2">
          <span class="badge bg-danger">Sale</span>
        </div>

        <!-- Product Image -->
        <img
          [src]="product.image"
          [alt]="product.name"
          class="card-img-top"
        />

        <!-- Product Details -->
        <div class="card-body d-flex flex-column text-center">
          <h5 class="card-title fw-bold mb-2">
            {{ product.name }}
          </h5>

          <p class="text-muted small mb-2">
            Premium quality product with excellent performance and durability.
          </p>

          <!-- Rating -->
          <div class="mb-2">
            ⭐⭐⭐⭐⭐
          </div>

          <!-- Price -->
          <p class="text-success fw-bold fs-5 mb-3">
            ₹{{ product.price }}
          </p>

          <!-- Action Buttons -->
          <div class="mt-auto">
            <button
              class="btn btn-primary w-100 mb-2"
              (click)="addToCart(product)"
            >
              🛒 Add to Cart
            </button>

            <button class="btn btn-outline-secondary w-100">
              👁️ View Details
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Promotional Banner -->
  <div class="row mt-5">
    <div class="col-12">
      <div class="bg-primary text-white rounded-4 p-5 text-center shadow">
        <h2 class="fw-bold mb-3">Special Offer!</h2>
        <p class="lead mb-4">
          Get up to 50% OFF on selected products. Limited time only.
        </p>
        <button class="btn btn-light btn-lg px-4">
          Shop the Sale
        </button>
      </div>
    </div>
  </div>
</section>
